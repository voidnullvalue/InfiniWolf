name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s tests -v

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME:-dev}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: Build GUI executable
        run: pyinstaller --onefile --windowed --name InfiniWolf run.py

      - name: Build CLI executable
        run: pyinstaller --onefile --name infiniwolf-cli infiniwolf_cli.py

      - name: Assemble release package
        run: python packaging/make_release.py --platform ${{ matrix.platform }} --version ${{ steps.version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: infiniwolf-${{ matrix.platform }}
          path: release/*.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
