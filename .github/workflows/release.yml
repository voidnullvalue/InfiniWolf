name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s tests -v

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build GUI executable
        run: pyinstaller --onefile --windowed --name InfiniWolf run.py

      - name: Build CLI executable
        run: pyinstaller --onefile --name infiniwolf-cli infiniwolf_cli.py

      - name: Assemble release package
        run: python packaging/make_release.py --platform ${{ matrix.platform }} --version ${{ steps.version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: infiniwolf-${{ matrix.platform }}
          path: release/*.zip

  publish:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Resolve release target
        id: target
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "title=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "title=Nightly build (${GITHUB_SHA:0:7})" >> "$GITHUB_OUTPUT"
          fi

      - name: Clear previous nightly release
        if: steps.target.outputs.tag == 'nightly'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete nightly --yes --cleanup-tag --repo "${{ github.repository }}" || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          name: ${{ steps.target.outputs.title }}
          prerelease: ${{ steps.target.outputs.prerelease }}
          make_latest: ${{ steps.target.outputs.prerelease == 'false' }}
          files: release/*.zip
          generate_release_notes: true
