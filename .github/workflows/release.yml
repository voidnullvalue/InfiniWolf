name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}

permissions:
  contents: write

# A newer main-branch candidate supersedes every older one. Keep tag-triggered
# runs in their own ref group so the auto-tag build can finish independently.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s tests -v

  # Auto-tag main-branch release commits from the declared project version.
  # Tag pushes skip this job (already have a tag) via the `if` guard.
  tag:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_tag: ${{ steps.gen.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: gen
        shell: bash
        run: |
          # Keep the Git tag and InfiniWolf's declared version identical.
          version=$(python3 -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "pyproject.toml has an invalid release version: ${version}" >&2
            exit 1
          fi
          tag="v${version}"
          if git rev-parse --verify --quiet "refs/tags/${tag}"; then
            echo "Release tag ${tag} already exists; bump the project version before merging to main." >&2
            exit 1
          fi
          echo "version_tag=${tag}" >> "$GITHUB_OUTPUT"
          git tag "${tag}"
          git push origin "${tag}"

  build:
    needs: [test, tag]
    # Run for both auto-tagged main pushes and manually-pushed version tags.
    if: always() && needs.test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Stamp build identity
        run: python packaging/stamp_build.py --commit "${{ github.sha }}"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ needs.tag.outputs.version_tag }}" ]]; then
            echo "version=${{ needs.tag.outputs.version_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build GUI executable
        run: pyinstaller --onefile --windowed --name InfiniWolf run.py

      - name: Build CLI executable
        run: pyinstaller --onefile --name infiniwolf-cli infiniwolf_cli.py

      - name: Assemble release package
        run: python packaging/make_release.py --platform ${{ matrix.platform }} --version ${{ steps.version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: infiniwolf-${{ matrix.platform }}
          path: release/*.zip

  publish:
    if: always() && needs.build.result == 'success'
    needs: [build, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Resolve release target
        id: target
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ needs.tag.outputs.version_tag }}" ]]; then
            tag="${{ needs.tag.outputs.version_tag }}"
          else
            tag="v0.0.dev"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "title=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          name: ${{ steps.target.outputs.title }}
          prerelease: false
          make_latest: true
          files: release/*.zip
          generate_release_notes: true
